name: Terraform Pipeline 

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      action:
        description: "Choose Terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

jobs:

  terraform:

    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3


    - name: Terraform Init
      run: |
        cd terraform
        terraform init -upgrade


    - name: Terraform Validate
      run: |
        cd terraform
        terraform validate


    - name: Terraform Plan
      run: |
        cd terraform
        terraform plan


    - name: Terraform Apply
      if: github.event.inputs.action == 'apply' || github.event_name == 'push'
      run: |
        cd terraform
        terraform apply -auto-approve

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: |
        aws eks update-kubeconfig \
        --region us-east-1 \
        --name migration-eks-cluster || true

    - name: Pre-clean Kubernetes (IMPORTANT)
      if: github.event.inputs.action == 'destroy'
      run: |
        kubectl get nodes || true
        kubectl delete svc --all -A || true
        kubectl delete ingress --all -A || true

    - name: Wait for LoadBalancer cleanup
      if: github.event.inputs.action == 'destroy'
      run: |
        echo "Waiting for AWS to delete load balancers..."
         sleep 180

    - name: Force delete remaining Load Balancers
      if: github.event.inputs.action == 'destroy'
      run: |
        LBS=$(aws elbv2 describe-load-balancers --query "LoadBalancers[].LoadBalancerArn" --output text)

        for lb in $LBS; do
          echo "Deleting LB: $lb"
          aws elbv2 delete-load-balancer --load-balancer-arn $lb || true
        done

    - name: Terraform Destroy EKS
      if: github.event.inputs.action == 'destroy'
      run: |
        cd terraform
        terraform destroy -target=module.eks -auto-approve


    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: |
        cd terraform
        terraform destroy -auto-approve

    - name: Configure kubectl
      if: github.event.inputs.action == 'apply' || github.event_name == 'push'
      run: |
        aws eks update-kubeconfig \
        --region us-east-1 \
        --name migration-eks-cluster

    - name: Install Helm
      if: github.event.inputs.action == 'apply' || github.event_name == 'push'
      run: |
         curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    - name: Install Monitoring
      if: github.event.inputs.action == 'apply' || github.event_name == 'push'
      run: |
        chmod +x ./helm/prometheus.sh
        ./helm/prometheus.sh

    
